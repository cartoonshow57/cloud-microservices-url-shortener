services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build: ./api_service
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BASE_URL=${BASE_URL:-http://localhost}
      - RATE_LIMIT=${RATE_LIMIT:-10}
      - RATE_WINDOW=${RATE_WINDOW:-60}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_net

  redirect:
    build: ./redirect_service
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
      - redirect
    networks:
      - app_net

volumes:
  redis_data:

networks:
  app_net:
    driver: bridge
