worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream api_backend {
        server api:8001;
    }

    upstream redirect_backend {
        server redirect:8002;
    }

    server {
        listen 80;
        server_name _;

        # API service: URL shortening endpoints
        location /shorten {
            proxy_pass http://api_backend/shorten;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /urls {
            proxy_pass http://api_backend/urls;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/health {
            proxy_pass http://api_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /redirect/health {
            proxy_pass http://redirect_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Everything else goes to the redirect service
        location / {
            proxy_pass http://redirect_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
